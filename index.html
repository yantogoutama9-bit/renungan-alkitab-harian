<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian - Alkitab 365</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #d4af37;
            --accent: #8b4513;
            --bg: #f5f1e8;
            --text: #2c3e50;
            --card: #ffffff;
            --shadow: rgba(0,0,0,0.1);
            --success: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Lora', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        .theme-creation { --primary: #1a3a3a; --secondary: #d4af37; --accent: #2e8b57; }
        .theme-exodus { --primary: #191970; --secondary: #ffd700; --accent: #4169e1; }
        .theme-wilderness { --primary: #8b7355; --secondary: #f4a460; --accent: #d2691e; }
        .theme-kingdom { --primary: #4a0080; --secondary: #ffd700; --accent: #800080; }
        .theme-wisdom { --primary: #2f4f4f; --secondary: #c0c0c0; --accent: #4682b4; }
        .theme-prophetic { --primary: #4a0000; --secondary: #ff4500; --accent: #8b0000; }
        .theme-gospel { --primary: #1e3a5f; --secondary: #87ceeb; --accent: #4682b4; }
        .theme-church { --primary: #8b4513; --secondary: #ff6347; --accent: #cd853f; }
        .theme-epistle { --primary: #2c3e50; --secondary: #ecf0f1; --accent: #34495e; }
        .theme-apocalyptic { --primary: #1a1a2e; --secondary: #e94560; --accent: #16213e; }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .nav-container {
            background: var(--card);
            padding: 1rem;
            box-shadow: 0 2px 10px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow);
            background: var(--accent);
        }

        .btn-success { background: var(--success); }
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-secondary:hover { background: var(--primary); color: white; }

        .progress-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .reader-panel {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px var(--shadow);
            border-top: 5px solid var(--secondary);
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .reader-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .reader-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .bible-display {
            background: #fafafa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 2rem;
            min-height: 200px;
        }

        .reading-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px var(--shadow);
            border-left: 5px solid var(--secondary);
        }

        .scripture-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .book-badge {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
        }

        .reading-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .theme-tag {
            display: inline-block;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .highlight-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-left: 4px solid var(--secondary);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
        }

        .language-section {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            padding: 2rem;
            border-radius: 12px;
            margin: 2rem 0;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .word-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .original-word {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .application-box {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
        }

        .nav-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            gap: 1rem;
        }

        .cycle-badge {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .reader-actions { justify-content: center; }
            .nav-footer { flex-direction: column; }
        }
    </style>
</head>
<body class="theme-creation">

    <header class="header">
        <h1><i class="fas fa-book-open"></i> Renungan Harian Alkitab</h1>
        <p>Memahami Firman dari Kejadian sampai Wahyu • Siklus <span id="cycle-number">1</span></p>
    </header>

    <nav class="nav-container">
        <div class="nav-content">
            <div>
                <input type="date" id="reading-date" style="padding: 0.5rem; border-radius: 8px; border: 2px solid var(--primary);">
                <button class="btn" onclick="loadToday()"><i class="fas fa-calendar-day"></i> Hari Ini</button>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="showOverview()"><i class="fas fa-list"></i> Ikhtisar</button>
                <button class="btn btn-secondary" onclick="showProgress()"><i class="fas fa-chart-line"></i> Progres</button>
            </div>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-family: 'Inter', sans-serif; font-size: 0.9rem;">
            <span id="progress-detail">Memuat...</span>
            <span id="days-remaining">...</span>
        </div>
    </div>

    <main class="container">
        <!-- Panel Bacaan Alkitab -->
        <div class="reader-panel" id="reader-panel">
            <div class="reader-header">
                <h2 class="reader-title"><i class="fas fa-book-reader"></i> Bacaan Alkitab Hari Ini</h2>
                <select id="bible-version" onchange="changeVersion()" style="padding: 0.5rem; border-radius: 8px; border: 2px solid var(--primary);">
                    <option value="tb">Terjemahan Baru (TB)</option>
                    <option value="net">NET Bible</option>
                    <option value="esv">ESV</option>
                    <option value="niv">NIV</option>
                    <option value="kjv">King James (KJV)</option>
                </select>
            </div>
            
            <div class="reader-actions">
                <button class="btn btn-success" onclick="openBibleWindow()">
                    <i class="fas fa-external-link-alt"></i> Baca di Bible Gateway
                </button>
                <button class="btn btn-secondary" onclick="toggleBiblePanel()">
                    <i class="fas fa-eye-slash"></i> Sembunyikan Panel
                </button>
                <button class="btn btn-secondary" onclick="copyReference()">
                    <i class="fas fa-copy"></i> Salin Referensi
                </button>
            </div>

            <div id="bible-display" class="bible-display">
                <p style="color: #666; text-align: center;">
                    <i class="fas fa-info-circle"></i> 
                    Klik "Baca di Bible Gateway" untuk membaca teks lengkap.<br>
                    <small>Referensi akan dibuka di jendela baru</small>
                </p>
            </div>
        </div>

        <button class="btn btn-secondary hidden" id="show-reader-btn" onclick="toggleBiblePanel()" style="margin-bottom: 2rem; width: 100%;">
            <i class="fas fa-eye"></i> Tampilkan Panel Bacaan Alkitab
        </button>

        <!-- Konten Renungan -->
        <div id="reading-content"></div>

        <div class="nav-footer">
            <button class="btn btn-secondary" onclick="previousDay()">
                <i class="fas fa-arrow-left"></i> Sebelumnya
            </button>
            <button class="btn btn-success" onclick="markAsRead()">
                <i class="fas fa-check"></i> Tandai Dibaca
            </button>
            <button class="btn btn-secondary" onclick="nextDay()">
                Berikutnya <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </main>

    <div class="cycle-badge" onclick="showCycleInfo()">
        <i class="fas fa-sync-alt"></i> Siklus <span id="cycle-badge-num">1</span>
    </div>

    <script>
        // Data Alkitab
        const bibleStructure = [
            { book: "Kejadian", chapters: 50, theme: "creation", category: "Taurat", abbr: "Genesis" },
            { book: "Keluaran", chapters: 40, theme: "exodus", category: "Taurat", abbr: "Exodus" },
            { book: "Imamat", chapters: 27, theme: "wilderness", category: "Taurat", abbr: "Leviticus" },
            { book: "Bilangan", chapters: 36, theme: "wilderness", category: "Taurat", abbr: "Numbers" },
            { book: "Ulangan", chapters: 34, theme: "wilderness", category: "Taurat", abbr: "Deuteronomy" },
            { book: "Yosua", chapters: 24, theme: "conquest", category: "Sejarah", abbr: "Joshua" },
            { book: "Hakim-hakim", chapters: 21, theme: "conquest", category: "Sejarah", abbr: "Judges" },
            { book: "Rut", chapters: 4, theme: "conquest", category: "Sejarah", abbr: "Ruth" },
            { book: "1 Samuel", chapters: 31, theme: "kingdom", category: "Sejarah", abbr: "1 Samuel" },
            { book: "2 Samuel", chapters: 24, theme: "kingdom", category: "Sejarah", abbr: "2 Samuel" },
            { book: "1 Raja-raja", chapters: 22, theme: "kingdom", category: "Sejarah", abbr: "1 Kings" },
            { book: "2 Raja-raja", chapters: 25, theme: "kingdom", category: "Sejarah", abbr: "2 Kings" },
            { book: "1 Tawarikh", chapters: 29, theme: "kingdom", category: "Sejarah", abbr: "1 Chronicles" },
            { book: "2 Tawarikh", chapters: 36, theme: "kingdom", category: "Sejarah", abbr: "2 Chronicles" },
            { book: "Ezra", chapters: 10, theme: "kingdom", category: "Sejarah", abbr: "Ezra" },
            { book: "Nehemia", chapters: 13, theme: "kingdom", category: "Sejarah", abbr: "Nehemiah" },
            { book: "Ester", chapters: 10, theme: "kingdom", category: "Sejarah", abbr: "Esther" },
            { book: "Ayub", chapters: 42, theme: "wisdom", category: "Ketuvim", abbr: "Job" },
            { book: "Mazmur", chapters: 150, theme: "wisdom", category: "Ketuvim", abbr: "Psalms" },
            { book: "Amsal", chapters: 31, theme: "wisdom", category: "Ketuvim", abbr: "Proverbs" },
            { book: "Pengkhotbah", chapters: 12, theme: "wisdom", category: "Ketuvim", abbr: "Ecclesiastes" },
            { book: "Kidung Agung", chapters: 8, theme: "wisdom", category: "Ketuvim", abbr: "Song of Solomon" },
            { book: "Yesaya", chapters: 66, theme: "prophetic", category: "Nabi-nabi Besar", abbr: "Isaiah" },
            { book: "Yeremia", chapters: 52, theme: "prophetic", category: "Nabi-nabi Besar", abbr: "Jeremiah" },
            { book: "Ratapan", chapters: 5, theme: "prophetic", category: "Nabi-nabi Besar", abbr: "Lamentations" },
            { book: "Yehezkiel", chapters: 48, theme: "prophetic", category: "Nabi-nabi Besar", abbr: "Ezekiel" },
            { book: "Daniel", chapters: 12, theme: "prophetic", category: "Nabi-nabi Besar", abbr: "Daniel" },
            { book: "Hosea", chapters: 14, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Hosea" },
            { book: "Yoel", chapters: 3, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Joel" },
            { book: "Amos", chapters: 9, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Amos" },
            { book: "Obaja", chapters: 1, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Obadiah" },
            { book: "Yunus", chapters: 4, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Jonah" },
            { book: "Mikha", chapters: 7, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Micah" },
            { book: "Nahum", chapters: 3, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Nahum" },
            { book: "Habakuk", chapters: 3, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Habakkuk" },
            { book: "Zefanya", chapters: 3, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Zephaniah" },
            { book: "Hagai", chapters: 2, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Haggai" },
            { book: "Zakharia", chapters: 14, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Zechariah" },
            { book: "Maleakhi", chapters: 4, theme: "prophetic", category: "Nabi-nabi Kecil", abbr: "Malachi" },
            { book: "Matius", chapters: 28, theme: "gospel", category: "Injil", abbr: "Matthew" },
            { book: "Markus", chapters: 16, theme: "gospel", category: "Injil", abbr: "Mark" },
            { book: "Lukas", chapters: 24, theme: "gospel", category: "Injil", abbr: "Luke" },
            { book: "Yohanes", chapters: 21, theme: "gospel", category: "Injil", abbr: "John" },
            { book: "Kisah Para Rasul", chapters: 28, theme: "church", category: "Sejarah", abbr: "Acts" },
            { book: "Roma", chapters: 16, theme: "epistle", category: "Surat Paulus", abbr: "Romans" },
            { book: "1 Korintus", chapters: 16, theme: "epistle", category: "Surat Paulus", abbr: "1 Corinthians" },
            { book: "2 Korintus", chapters: 13, theme: "epistle", category: "Surat Paulus", abbr: "2 Corinthians" },
            { book: "Galatia", chapters: 6, theme: "epistle", category: "Surat Paulus", abbr: "Galatians" },
            { book: "Efesus", chapters: 6, theme: "epistle", category: "Surat Paulus", abbr: "Ephesians" },
            { book: "Filipi", chapters: 4, theme: "epistle", category: "Surat Paulus", abbr: "Philippians" },
            { book: "Kolose", chapters: 4, theme: "epistle", category: "Surat Paulus", abbr: "Colossians" },
            { book: "1 Tesalonika", chapters: 5, theme: "epistle", category: "Surat Paulus", abbr: "1 Thessalonians" },
            { book: "2 Tesalonika", chapters: 3, theme: "epistle", category: "Surat Paulus", abbr: "2 Thessalonians" },
            { book: "1 Timotius", chapters: 6, theme: "epistle", category: "Surat Paulus", abbr: "1 Timothy" },
            { book: "2 Timotius", chapters: 4, theme: "epistle", category: "Surat Paulus", abbr: "2 Timothy" },
            { book: "Titus", chapters: 3, theme: "epistle", category: "Surat Paulus", abbr: "Titus" },
            { book: "Filemon", chapters: 1, theme: "epistle", category: "Surat Paulus", abbr: "Philemon" },
            { book: "Ibrani", chapters: 13, theme: "epistle", category: "Surat Umum", abbr: "Hebrews" },
            { book: "Yakobus", chapters: 5, theme: "epistle", category: "Surat Umum", abbr: "James" },
            { book: "1 Petrus", chapters: 5, theme: "epistle", category: "Surat Umum", abbr: "1 Peter" },
            { book: "2 Petrus", chapters: 3, theme: "epistle", category: "Surat Umum", abbr: "2 Peter" },
            { book: "1 Yohanes", chapters: 5, theme: "epistle", category: "Surat Umum", abbr: "1 John" },
            { book: "2 Yohanes", chapters: 1, theme: "epistle", category: "Surat Umum", abbr: "2 John" },
            { book: "3 Yohanes", chapters: 1, theme: "epistle", category: "Surat Umum", abbr: "3 John" },
            { book: "Yudas", chapters: 1, theme: "epistle", category: "Surat Umum", abbr: "Jude" },
            { book: "Wahyu", chapters: 22, theme: "apocalyptic", category: "Wahyu", abbr: "Revelation" }
        ];

        // Generate reading plan
        function generateReadingPlan() {
            let plan = [];
            let day = 1;
            
            for (let book of bibleStructure) {
                let remainingChapters = book.chapters;
                let currentChapter = 1;
                
                while (remainingChapters > 0) {
                    let chaptersToRead = Math.min(3, remainingChapters);
                    let endChapter = currentChapter + chaptersToRead - 1;
                    
                    plan.push({
                        day: day,
                        book: book.book,
                        bookEn: book.abbr,
                        startChapter: currentChapter,
                        endChapter: endChapter,
                        theme: book.theme,
                        category: book.category,
                        reference: `${book.book} ${currentChapter}${chaptersToRead > 1 ? '-' + endChapter : ''}`,
                        referenceEn: `${book.abbr} ${currentChapter}${chaptersToRead > 1 ? '-' + endChapter : ''}`
                    });
                    
                    currentChapter += chaptersToRead;
                    remainingChapters -= chaptersToRead;
                    day++;
                }
            }
            return plan;
        }

        const readingPlan = generateReadingPlan();
        const totalDays = readingPlan.length;

        // State
        let currentState = {
            currentDay: 1,
            cycle: 1,
            readDays: new Set(),
            lastDate: new Date().toISOString().split('T')[0],
            bibleVersion: 'tb'
        };

        // Initialize
        function init() {
            loadState();
            document.getElementById('reading-date').value = currentState.lastDate;
            document.getElementById('bible-version').value = currentState.bibleVersion;
            loadReading(currentState.currentDay);
        }

        function loadState() {
            const saved = localStorage.getItem('bibleReadingState');
            if (saved) {
                const parsed = JSON.parse(saved);
                currentState = { ...currentState, ...parsed };
                if (parsed.readDays) currentState.readDays = new Set(parsed.readDays);
            }
            updateCycleDisplay();
        }

        function saveState() {
            const toSave = { ...currentState, readDays: Array.from(currentState.readDays) };
            localStorage.setItem('bibleReadingState', JSON.stringify(toSave));
        }

        function updateCycleDisplay() {
            document.getElementById('cycle-number').textContent = currentState.cycle;
            document.getElementById('cycle-badge-num').textContent = currentState.cycle;
        }

        // Bible Functions
        function openBibleWindow() {
            const planItem = readingPlan[currentState.currentDay - 1];
            const version = document.getElementById('bible-version').value;
            const ref = planItem.referenceEn;
            
            const versions = { tb: 'TB', net: 'NET', esv: 'ESV', niv: 'NIV', kjv: 'KJV' };
            const url = `https://www.biblegateway.com/passage/?search=${encodeURIComponent(ref)}&version=${versions[version]}`;
            
            window.open(url, '_blank', 'width=1024,height=768,scrollbars=yes');
        }

        function changeVersion() {
            currentState.bibleVersion = document.getElementById('bible-version').value;
            saveState();
            updateBibleDisplay();
        }

        function updateBibleDisplay() {
            const planItem = readingPlan[currentState.currentDay - 1];
            const display = document.getElementById('bible-display');
            const version = document.getElementById('bible-version').value.toUpperCase();
            
            display.innerHTML = `
                <div style="background: #e3f2fd; padding: 1rem; border-radius: 8px; border-left: 4px solid #2196f3; margin-bottom: 1rem;">
                    <strong><i class="fas fa-book-open"></i> Hari ${currentState.currentDay}</strong><br>
                    <strong>${planItem.reference}</strong> (${version})<br>
                    <small>Kategori: ${planItem.category}</small>
                </div>
                <p style="color: #666; text-align: center; margin-top: 2rem;">
                    <i class="fas fa-external-link-alt fa-2x" style="color: var(--secondary); margin-bottom: 1rem;"></i><br>
                    Klik tombol <strong>"Baca di Bible Gateway"</strong> di atas untuk membaca teks lengkap<br>
                    <small style="display: block; margin-top: 1rem;">Akan membuka biblegateway.com di jendela baru</small>
                </p>
            `;
        }

        function toggleBiblePanel() {
            const panel = document.getElementById('reader-panel');
            const btn = document.getElementById('show-reader-btn');
            
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.classList.add('hidden');
            } else {
                panel.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        }

        function copyReference() {
            const planItem = readingPlan[currentState.currentDay - 1];
            navigator.clipboard.writeText(planItem.reference).then(() => {
                alert('Referensi disalin: ' + planItem.reference);
            });
        }

        // Content Generation
        function generateContent(planItem, cycle) {
            const themes = {
                creation: {
                    title: "Ciptaan yang Sempurna",
                    focus: ["Hubungan manusia dengan Sang Pencipta", "Tanggung jawab pengelolaan bumi", "Keindahan dan ketertiban ciptaan"],
                    hebrew: [
                        { word: "בְּרֵאשִׁית", translit: "Beresyt", meaning: "Dalam permulaan - Menunjukkan awal dari segala sesuatu" },
                        { word: "בָּרָא", translit: "Bara", meaning: "Menciptakan - Kata khusus untuk penciptaan ilahi" }
                    ]
                },
                exodus: {
                    title: "Pembebasan Ilahi",
                    focus: ["Tuhan yang memperhatikan penderitaan", "Kuasa yang membebaskan", "Panggilan untuk menjadi umat kesayangan"],
                    hebrew: [
                        { word: "יְהוָה", translit: "YHWH", meaning: "Aku adalah Aku - Nama yang menyatakan keberadaan kekal" },
                        { word: "פֶּסַח", translit: "Pesach", meaning: "Paskah - Melewati, melindungi dari penghakiman" }
                    ]
                },
                wilderness: {
                    title: "Pemurnian di Padang Gurun",
                    focus: ["Ketergantungan pada Tuhan", "Hukum sebagai pedoman hidup", "Kesabaran dalam pengujian"],
                    hebrew: [
                        { word: "תּוֹרָה", translit: "Torah", meaning: "Hukum/Taurat - Petunjuk, ajaran untuk hidup" },
                        { word: "מִצְוָה", translit: "Mitzvah", meaning: "Perintah - Ikatan yang membangun hubungan" }
                    ]
                },
                kingdom: {
                    title: "Kerajaan dan Pemerintahan",
                    focus: ["Hati yang berkenan kepada Tuhan", "Konsekuensi pemilihan", "Penantian Mesias"],
                    hebrew: [
                        { word: "מָשִׁיחַ", translit: "Mashiach", meaning: "Mesias - Yang diurapi, Raja yang dijanjikan" },
                        { word: "בְּרִית", translit: "Berit", meaning: "Perjanjian - Ikatan yang tidak dapat diputuskan" }
                    ]
                },
                wisdom: {
                    title: "Hikmat untuk Kehidupan",
                    focus: ["Takut akan Tuhan adalah permulaan hikmat", "Kehidupan yang bermakna", "Hubungan yang kudus"],
                    hebrew: [
                        { word: "חָכְמָה", translit: "Chokmah", meaning: "Hikmat - Keterampilan hidup, kebijaksanaan praktis" },
                        { word: "יִרְאָה", translit: "Yirah", meaning: "Takut - Rasa hormat, kagum yang memuliakan" }
                    ]
                },
                prophetic: {
                    title: "Suara Tuhan dalam Sejarah",
                    focus: ["Panggilan untuk pertobatan", "Harapan akan pemulihan", "Keadilan dan belas kasihan"],
                    hebrew: [
                        { word: "נָבִיא", translit: "Navi", meaning: "Nabi - Yang dipanggil untuk berbicara" },
                        { word: "צְדָקָה", translit: "Tsedakah", meaning: "Kebenaran - Yang benar sesuai standar ilahi" }
                    ]
                },
                gospel: {
                    title: "Injil Keselamatan",
                    focus: ["Kerajaan Allah telah dekat", "Pengorbanan yang menebus", "Kebangkitan dan kemenangan"],
                    greek: [
                        { word: "ἀγάπη", translit: "Agape", meaning: "Kasih ilahi - Cinta tanpa syarat, mengorbankan diri" },
                        { word: "σωτηρία", translit: "Soteria", meaning: "Keselamatan - Pembebasan menyeluruh" },
                        { word: "βασιλεία", translit: "Basileia", meaning: "Kerajaan - Pemerintahan, kedaulatan Allah" }
                    ]
                },
                church: {
                    title: "Jemaat yang Terus Bertumbuh",
                    focus: ["Roh Kudus yang memimpin", "Komunitas yang kudus", "Misi ke seluruh dunia"],
                    greek: [
                        { word: "ἐκκλησία", translit: "Ekklesia", meaning: "Jemaat - Yang dipanggil keluar, kumpulan orang percaya" },
                        { word: "πνεῦμα", translit: "Pneuma", meaning: "Roh - Nafas, angin, kekuatan ilahi" }
                    ]
                },
                epistle: {
                    title: "Ajaran untuk Jemaat",
                    focus: ["Iman yang dibuktikan dengan perbuatan", "Kasih dalam tindakan", "Pengharapan yang teguh"],
                    greek: [
                        { word: "πίστις", translit: "Pistis", meaning: "Iman - Kepercayaan, kesetiaan yang bertindak" },
                        { word: "χάρις", translit: "Charis", meaning: "Kasih karunia - Anugerah cuma-cuma" }
                    ]
                },
                apocalyptic: {
                    title: "Kemenangan Akhir",
                    focus: ["Kesetiaan menghadapi penganiayaan", "Penghakiman yang adil", "Pembaruan segala sesuatu"],
                    greek: [
                        { word: "ἀποκάλυψις", translit: "Apokalypsis", meaning: "Wahyu - Pembukaan yang tersembunyi" },
                        { word: "νίκη", translit: "Nike", meaning: "Kemenangan - Keberhasilan melalui pertempuran" }
                    ]
                }
            };

            const theme = themes[planItem.theme] || themes.creation;
            const angles = {
                1: "Pendekatan Historis-Kronologis",
                2: "Pendekatan Teologis",
                3: "Pendekatan Kristologis",
                4: "Pendekatan Ekleisologis",
                5: "Pendekatan Eskatologis"
            };
            const angle = angles[cycle % 5 || 5];
            const focusIndex = (cycle - 1) % theme.focus.length;
            const currentFocus = theme.focus[focusIndex];

            let chapterSummaries = "";
            for (let i = planItem.startChapter; i <= planItem.endChapter; i++) {
                chapterSummaries += `<p><strong>${planItem.book} ${i}:</strong> ${getChapterSummary(planItem.book, i, cycle)}</p>`;
            }

            let languageSection = '';
            if (theme.hebrew && (planItem.category !== "Injil" && planItem.category !== "Surat Paulus" && planItem.category !== "Surat Umum" && planItem.category !== "Wahyu")) {
                languageSection = generateHebrewSection(theme.hebrew, cycle);
            } else if (theme.greek) {
                languageSection = generateGreekSection(theme.greek, cycle);
            }

            return `
                <div class="reading-card">
                    <div class="scripture-header">
                        <span class="book-badge">${planItem.category}</span>
                        <span class="chapter-range">${planItem.reference}</span>
                    </div>
                    
                    <h2 class="reading-title">${theme.title}</h2>
                    <span class="theme-tag">${angle} • Siklus ${cycle}</span>

                    <div class="content-section">
                        <h3 class="section-title">Ringkasan Bacaan</h3>
                        <div class="devotional-text">
                            ${chapterSummaries}
                        </div>
                    </div>

                    <div class="content-section">
                        <h3 class="section-title">Renungan Utama</h3>
                        <div class="highlight-box">
                            <p class="devotional-text">
                                <strong>Fokus:</strong> ${currentFocus}<br><br>
                                ${generateDevotionalText(planItem, cycle, angle)}
                            </p>
                        </div>
                    </div>

                    ${languageSection}

                    <div class="application-box">
                        <h3 class="application-title">Aplikasi Hidup</h3>
                        <ul class="application-list">
                            ${generateApplications(planItem, cycle)}
                        </ul>
                    </div>
                </div>
            `;
        }

        function getChapterSummary(book, chapter, cycle) {
            const summaries = {
                "Kejadian": {
                    1: ["Allah menciptakan langit dan bumi dalam enam hari", "Elohim yang berkuasa menciptakan dengan firman-Nya", "Kristus sebagai Firman yang menciptakan", "Jemaat sebagai ciptaan baru", "Ciptaan baru yang sempurna"][cycle % 5],
                    2: "Allah menyelesaikan ciptaan dan menciptakan manusia dari debu",
                    3: "Kejatuhan manusia dan janji pembebasan dari keturunan perempuan"
                },
                "Keluaran": {
                    1: "Bangsa Israel menderita di Mesir dan kelahiran Musa",
                    2: "Musa melarikan diri dan dipanggil dari semak yang menyala",
                    3: "YHWH memperkenalkan diri dan berjanji membebaskan"
                }
            };
            return (summaries[book] && summaries[book][chapter]) || `Bab ini mengandung kebenaran penting dalam siklus ${cycle}.`;
        }

        function generateDevotionalText(planItem, cycle, angle) {
            const texts = {
                1: `Dalam membaca ${planItem.book}, kita melihat alur sejarah keselamatan yang nyata. Allah bekerja dalam konteks budaya tertentu, namun prinsip-prinsip-Nya kekal.`,
                2: `Allah yang sama yang berbicara dalam ${planItem.book} adalah Allah yang kita sembah hari ini. Karakter-Nya penuh kasih namun adil.`,
                3: `Setiap pasal menunjuk kepada Kristus. Di ${planItem.book}, kita melihat bayangan-bayangan akan penebusan yang sempurna.`,
                4: `Sebagai jemaat Allah, kita adalah kelanjutan dari kisah yang dimulai dalam ${planItem.book}. Panggilan dahulu menjadi pelajaran bagi kita.`,
                5: `Membaca ${planItem.book} membuat kita mengharapkan kepenuhan kerajaan Allah. Setiap janji akan menjadi kenyataan.`
            };
            return texts[cycle % 5 || 5];
        }

        function generateHebrewSection(words, cycle) {
            const selected = words.slice(0, Math.min(2, words.length));
            return `
                <div class="language-section">
                    <h3 class="language-title">Kata Kunci Bahasa Ibrani</h3>
                    <div class="word-grid">
                        ${selected.map(w => `
                            <div class="word-card">
                                <div class="original-word">${w.word}</div>
                                <div class="transliteration">${w.translit}</div>
                                <div class="word-meaning">${w.meaning}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function generateGreekSection(words, cycle) {
            const selected = words.slice(0, Math.min(2, words.length));
            return `
                <div class="language-section">
                    <h3 class="language-title">Kata Kunci Bahasa Yunani Koiné</h3>
                    <div class="word-grid">
                        ${selected.map(w => `
                            <div class="word-card">
                                <div class="original-word">${w.word}</div>
                                <div class="transliteration">${w.translit}</div>
                                <div class="word-meaning">${w.meaning}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function generateApplications(planItem, cycle) {
            const apps = [
                "Renungkan bagaimana firman ini mengubah pemahamanmu tentang Allah",
                "Identifikasi satu perintah atau contoh yang bisa diterapkan hari ini",
                "Doakan orang yang belum mengenal Kristus berdasarkan kebenaran ini",
                "Bagikan pengalamanmu dengan anggota keluarga atau teman seiman",
                "Tulis ayat kunci dan tempel di tempat yang sering dilihat"
            ];
            const start = (cycle - 1) % apps.length;
            let result = [];
            for (let i = 0; i < 3; i++) {
                result.push(`<li>${apps[(start + i) % apps.length]}</li>`);
            }
            return result.join('');
        }

        // Main Functions
        function loadReading(day) {
            if (day < 1) day = 1;
            if (day > totalDays) {
                completeCycle();
                return;
            }
            
            currentState.currentDay = day;
            const planItem = readingPlan[day - 1];
            
            document.body.className = `theme-${planItem.theme}`;
            
            document.getElementById('reading-content').innerHTML = generateContent(planItem, currentState.cycle);
            updateBibleDisplay();
            updateProgress();
            saveState();
        }

        function completeCycle() {
            currentState.cycle++;
            currentState.currentDay = 1;
            currentState.readDays.clear();
            alert(`Selamat! Anda menyelesaikan Siklus ${currentState.cycle - 1}. Memulai Siklus ${currentState.cycle} dengan perspektif baru!`);
            updateCycleDisplay();
            loadReading(1);
        }

        function updateProgress() {
            const progress = (currentState.currentDay / totalDays) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-detail').textContent = `Hari ${currentState.currentDay} dari ${totalDays} (${Math.round(progress)}%)`;
            document.getElementById('days-remaining').textContent = `${totalDays - currentState.currentDay} hari lagi`;
        }

        function markAsRead() {
            currentState.readDays.add(currentState.currentDay);
            saveState();
            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-check"></i> Sudah Dibaca';
            btn.style.background = '#229954';
            setTimeout(() => {
                nextDay();
                btn.innerHTML = '<i class="fas fa-check"></i> Tandai Dibaca';
                btn.style.background = '';
            }, 1000);
        }

        function nextDay() {
            loadReading(currentState.currentDay + 1);
        }

        function previousDay() {
            loadReading(currentState.currentDay - 1);
        }

        function loadToday() {
            const today = new Date();
            const startDate = new Date(localStorage.getItem('startDate') || today);
            if (!localStorage.getItem('startDate')) {
                localStorage.setItem('startDate', today.toISOString());
            }
            const diffTime = Math.abs(today - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            loadReading((diffDays % totalDays) || 1);
        }

        function showOverview() {
            const categories = {};
            bibleStructure.forEach(book => {
                if (!categories[book.category]) categories[book.category] = [];
                categories[book.category].push(book);
            });
            
            let html = '<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">';
            for (let [cat, books] of Object.entries(categories)) {
                html += `
                    <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px;">
                        <h3 style="color: var(--primary); margin-bottom: 0.5rem;">${cat}</h3>
                        <ul style="list-style: none; font-size: 0.85rem;">
                            ${books.map(b => `<li>${b.book} (${b.chapters})</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            html += '</div>';
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
                    <h2 class="reading-title">Struktur Alkitab</h2>
                    ${html}
                </div>
            `;
            document.body.appendChild(modal);
        }

        function showProgress() {
            const readCount = currentState.readDays.size;
            const percentage = ((readCount / totalDays) * 100).toFixed(1);
            alert(`Progres Anda:\n\n• Hari dibaca: ${readCount} dari ${totalDays}\n• Persentase: ${percentage}%\n• Siklus: ${currentState.cycle}\n• Hari ini: ${readingPlan[currentState.currentDay - 1].reference}`);
        }

        function showCycleInfo() {
            const info = {
                1: "Historis-Kronologis: Memahami Alkitab sebagai kisah berurutan",
                2: "Teologis: Menemukan sifat dan karakter Allah",
                3: "Kristologis: Menemukan Yesus di seluruh Alkitab",
                4: "Ekleisologis: Memahami jemaat dan panggilan kita",
                5: "Eskatologis: Mengharapkan kedatangan Kristus kedua"
            };
            const current = (currentState.cycle - 1) % 5 + 1;
            alert(`Siklus ${currentState.cycle}: ${info[current]}`);
        }

        // Event Listeners
        document.getElementById('reading-date').addEventListener('change', function(e) {
            const selected = new Date(e.target.value);
            const start = new Date(localStorage.getItem('startDate') || new Date());
            const diff = Math.ceil(Math.abs(selected - start) / (1000 * 60 * 60 * 24));
            loadReading((diff % totalDays) + 1);
        });

        // Start
        init();
    </script>
</body>
</html>
