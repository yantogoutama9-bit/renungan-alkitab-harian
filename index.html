	addDay(85, "Yosua 9:1-10:43", "Perjanjian dengan orang Gibeon, matahari berhenti, kemenangan besar", "Lukas 17:1-37", "Tidak ada yang tidak berdosa, mengampuni, iman seperti biji sesawi, kedatangan Anak Manusia", "Mazmur 85:1-13", "Engkau telah berkenan kepada tanah-Mu", "Perjanjian dan Iman", "Orang Gibeon menipu untuk perjanjian damai. Matahari berhenti karena doa Yosua. Yesus mengajarkan tentang pengampunan dan iman kecil yang besar kuasanya. Mazmur 85 adalah doa untuk pemulihan dan kasih karunia.", "שׁמשׁ", "Shemesh", "Matahari - matahari berhenti karena iman dan doa yang berani", "Pegangilah perjanjian meski dibuat karena tipu daya. Miliki iman yang menghentikan 'matahari'. Doakan pemulihan dan kasih karunia.", "Ya Tuhan, berikan saya iman yang berani dan ampuni seperti yang Kau ajarkan. Amin.");

	addDay(86, "Yosua 11:1-13:33", "Kemenangan di utara, daftar raja-raja yang dikalahkan, tanah yang belum ditaklukkan", "Lukas 18:1-43", "Perumpamaan janda yang tidak adil, Farisi dan pemungut cukai, Yesus memberkati anak-anak, orang kaya, buta di Yerikho", "Mazmur 86:1-17", "Condongkanlah telinga-Mu ya TUHAN, jawablah aku", "Kemenangan dan Ketergantungan", "Kemenangan besar di utara menyelesaikan penaklukan utama. Tetapi ada tanah yang belum ditaklukkan. Yesus mengajarkan ketekunan dalam doa dan kerendahan hati. Mazmur 86 adalah doa orang miskin yang bergantung pada Tuhan.", "נחלה", "Nachalah", "Warisan - tanah yang dijanjikan sebagai warisan yang harus ditaklukkan sepenuhnya", "Taklukkan 'tanah' janji sepenuhnya, jangan setengah-setengah. Tekunlah dalam doa dan rendahkan hati. Bergantunglah pada Tuhan dalam kemiskinan.", "Ya Tuhan, bantu saya menaklukkan warisan rohani sepenuhnya dan tekun dalam doa. Amin.");

	addDay(87, "Yosua 14:1-17:18", "Tanah di sebelah barat Yordan, Kaleb meminta Hebron, tanah untuk suku Efraim dan Manasye", "Lukas 19:1-48", "Zakheus, perumpamaan mina, masuk Yerusalem, membersihkan bait suci", "Mazmur 87:1-7", "Yang dilahirkan di sana mengenal dia", "Warisan dan Transformasi", "Kaleb mendapat warisan karena imannya di Kadesh Barnea. Yesus mentransformasi Zakheus dan memasuki Yerusalem sebagai Raja. Mazmur 87 memuji Sion sebagai tempat kelahiran rohani bagi semua bangsa.", "אחזה", "Achazah", "Milik/warisan - hak milik yang diperoleh melalui iman dan ketekunan", "Kejarlah warisan rohani dengan iman seperti Kaleb. Biarlah Yesus mentransformasi hidupmu seperti Zakheus. Banggalah sebagai warga Sion.", "Ya Tuhan, berikan saya iman seperti Kaleb untuk menerima warisan-Mu. Amin.");

	addDay(88, "Yosua 18:1-20:9", "Kemah Sion dipindahkan ke Silo, sisa tanah dibagi, kota perlindungan", "Lukas 20:1-47", "Otoritas Yesus dipertanyakan, perumpamaan penggarap kebun anggur, uang pajak, anak Daud, ahli-ahli Taurat", "Mazmur 88:1-18", "Ya TUHAN, Allah yang menyelamatkan aku", "Tempat Kudus dan Otoritas", "Kemah Sion dipindahkan ke Silo. Kota perlindungan ditetapkan untuk keadilan. Yesus menghadapi pertanyaan tentang otoritas-Nya. Mazmur 88 adalah ratapan dalam kesesakan yang paling gelap.", "מקלט", "Miklat", "Tempat perlindungan - tempat aman bagi yang mencari keadilan", "Cari 'tempat kudus' untuk bersekutu dengan Tuhan. Hormati otoritas Yesus yang ilahi. Bawalah ratapanmu kepada Tuhan meski dalam kegelapan.", "Ya Tuhan, Engkaulah tempat perlindunganku dalam kesesakan. Amin.");

	addDay(89, "Yosua 21:1-22:34", "Kota-kota orang Lewi, mezbah besar di seberang Yordan", "Lukas 21:1-38", "Persembahan janda, kehancuran bait suci, tanda kedatangan, berjaga-jaga", "Mazmur 89:1-52", "Kasih setia TUHAN akan kunyanyikan selama-lamanya", "Pelayanan dan Kesaksian", "Orang Lewi menerima kota-kota untuk pelayanan. Mezbah besar menjadi kesaksian persekutuan. Yesus memuji persembahan janda dan mengajarkan tentang kedatangan-Nya. Mazmur 89 adalah refleksi atas perjanjian dengan Daud meski menghadapi kegagalan.", "עדות", "Edut", "Kesaksian - mezbah sebagai kesaksian persekutuan antara suku-suku", "Layani dengan setia seperti orang Lewi. Berikan persembahan dengan ikhlas seperti janda. Peganglah perjanjian Tuhan meski menghadapi kegagalan.", "Ya Tuhan, bantu saya melayani dengan setia dan bersembahkan yang terbaik. Amin.");

	addDay(90, "Yosua 23:1-24:33", "Peringatan Yosua, perjanjian di Sikhem, kematian Yosua dan Eleazar", "Lukas 22:1-71", "Rencana pembunuhan, perjamuan terakhir, penangkapan, penyangkalan", "Mazmur 90:1-17", "Tuhan, Engkau telah menjadi tempat perteduhan bagi kami", "Pilihan dan Kesetiaan", "Yosua menantang umat untuk memilih siapa yang akan mereka layani. Yesus menghadapi pengkhianatan dan penyangkalan. Mazmur 90 adalah doa Musa untuk menghitung hari-hari dengan bijaksana.", "בחר", "Bachar", "Memilih - pilihan untuk melayani Tuhan meski yang lain memilih berhala", "Pilihlah hari ini untuk melayani Tuhan. Hadapi pengkhianatan dengan pengampunan. Hitunglah hari-harimu dengan bijaksana.", "Ya Tuhan, aku dan seisi rumahku akan melayani TUHAN. Amin.");

	addDay(91, "Hakim-hakim 1:1-2:23", "Kemenangan setelah kematian Yosua, siklus dosa dan pembebasan", "Lukas 23:1-56", "Yesus dihadapkan Pilatus, disalibkan, mati, dimakamkan", "Mazmur 91:1-16", "Yang diam dalam naungan Yang Mahatinggi", "Siklus Dosa dan Keselamatan", "Siklus Hakim-hakim: dosa, penindasan, seruan, pembebasan. Yesus mati di kayu salib untuk memutus siklus dosa. Mazmur 91 adalah keyakinan perlindungan bagi yang berlindung dalam Tuhan.", "ישׁע", "Yasha", "Menyelamatkan - pembebasan yang datang dari Tuhan melalui hakim-hakim", "Yesus memutus siklus dosa dengan kematian-Nya. Berlindunglah dalam naungan Tuhan. Percayalah perlindungan ilahi dalam bahaya.", "Ya Tuhan, terima kasih memutus siklus dosa melalui Yesus. Amin.");

	addDay(92, "Hakim-hakim 3:1-4:31", "Otniel, Ehud, Sanggar, Debora dan Barak", "Lukas 24:1-53", "Kebangkitan Yesus, di jalan ke Emaus, penampakan, kenaikan", "Mazmur 92:1-15", "Baik menyanyikan syukur kepada TUHAN", "Pembebasan dan Kebangkitan", "Hakim-hakim membebaskan umat dari penindasan. Yesus bangkit dan naik ke sorga. Mazmur 92 adalah syukur atas perbuatan-perbuatan besar Tuhan.", "שׁפט", "Shaphat", "Hakim - yang membebaskan umat dari penindasan asing", "Rayakan pembebasan rohani dalam Kristus. Saksikan kebangkitan Yesus dengan sukacita. Bersyukurlah atas perbuatan-perbuatan besar Tuhan.", "Ya Tuhan, terima kasih untuk pembebasan dan kebangkitan. Amin.");

	addDay(93, "Hakim-hakim 5:1-6:40", "Nyanyian Debora, Gideon dipanggil, tanda-tanda dari Tuhan", "Yohanes 1:1-34", "Firman menjadi manusia, saksi Yohanes, Yesus Anak Domba Allah", "Mazmur 93:1-5", "TUHAN adalah Raja, Ia berpakaian keagungan", "Pembebasan dan Firman", "Debora dan Barak memenangkan kemenangan besar. Gideon dipanggil dengan tanda-tanda. Yesus adalah Firman yang menjadi manusia. Mazmur 93 memuji Tuhan sebagai Raja yang berkuasa atas air bah.", "אור", "Or", "Terang - Gideon dan terang yang menyinari, Yesus sebagai terang dunia", "Percayalah panggilan Tuhan meski merasa lemah. Yesus adalah terang yang datang ke dunia. Sembah Raja yang berkuasa atas kekacauan.", "Ya Tuhan, Firman telah menjadi daging dan diam di antara kami. Amin.");

	addDay(94, "Hakim-hakim 7:1-8:35", "Gideon dengan 300 orang, pengejaran, pemerintahan Gideon, efora", "Yohanes 1:35-2:25", "Murid-murid pertama, perubahan air menjadi anggur, membersihkan bait suci", "Mazmur 94:1-23", "Ya Allah pembalas, ya TUHAN, ya Allah pembalas", "Kemenangan dan Kebanggaan", "Gideon menang dengan 300 orang melawan ribuan. Tetapi kebanggaan membawa penyembahan berhala. Yesus mengubah air menjadi anggur dan membersihkan bait suci. Mazmur 94 adalah doa untuk penghakiman atas orang jahat.", "מלחמה", "Milchamah", "Perang - kemenangan yang datang dari strategi Tuhan, bukan kekuatan manusia", "Menanglah dengan '300' iman, bukan kekuatan dunia. Waspadai kebanggaan setelah kemenangan. Serahkan penghakiman kepada Tuhan.", "Ya Tuhan, bantu saya menang dengan iman dan waspadai kebanggaan. Amin.");

	addDay(95, "Hakim-hakim 9:1-10:18", "Abimelekh, Tolah, Yair, Yefta", "Yohanes 3:1-36", "Nikodemus, lahir baru, Anak Manusia ditinggikan, kasih Allah", "Mazmur 95:1-11", "Marilah kita bersorak-sorai bagi TUHAN", "Kepemimpinan dan Kelahiran Baru", "Abimelekh memimpin dengan kekerasan. Yefta membuat nazir yang tragis. Yesus mengajarkan tentang lahir baru dari air dan Roh. Mazmur 95 adalah seruan untuk bersorak dan peringatan untuk tidak keras hati.", "נולד", "Nolad", "Lahir - lahir baru yang diperlukan untuk melihat kerajaan Allah", "Kepemimpinan rohani harus dengan kerendahan hati, bukan kekerasan. Lahirlah baru dari air dan Roh. Bersoraklah dan jangan keras hati.", "Ya Tuhan, lahirkan saya baru agar bisa melihat kerajaan-Mu. Amin.");

	addDay(96, "Hakim-hakim 11:1-12:15", "Yefta dan nazirnya, perang dengan Efraim", "Yohanes 4:1-54", "Perempuan Samaria, penyembahan yang benar, anak bangsawan, penyembuhan", "Mazmur 96:1-13", "Bernyanyilah bagi TUHAN, nyanyikanlah syukur", "Pengabdian dan Penyembahan", "Yefta memenuhi nazirnya dengan pengorbanan tragis. Yesus mengajarkan tentang penyembahan dalam roh dan kebenaran. Mazmur 96 adalah seruan untuk menyanyikan syukur baru bagi Tuhan.", "נדר", "Neder", "Nazir - pengabdian yang harus dipenuhi meski mahal harganya", "Penuhilah janji-janjimu kepada Tuhan meski mahal. Sembah dalam roh dan kebenaran. Nyanyikanlah syukur baru bagi Tuhan.", "Ya Tuhan, bantu saya memenuhi janji dan menyembah dalam roh. Amin.");

	addDay(97, "Hakim-hakim 13:1-16:31", "Simson, nazir dari kandungan, kekuatan dan kelemahan", "Yohanes 5:1-47", "Orang sakit di kolam Betesda, Anak berkuasa, saksi-saksi Yesus", "Mazmur 97:1-12", "TUHAN adalah Raja, bersorak-soraklah hai bumi", "Kuasa dan Kelemahan", "Simson memiliki kuasa besar sebagai nazir tetapi kelemahan moral. Yesus menyembuhkan dan menunjukkan kuasa sebagai Anak Allah. Mazmur 97 memuji Tuhan sebagai Raja yang diikuti oleh awan dan kegelapan.", "שׁמשׁון", "Shimshon", "Simson - kuasa yang diberikan melalui nazir, yang rusak karena kelemahan moral", "Gunakan kuasa dengan bertanggung jawab. Jangan biarkan kelemahan moral merusak panggilan. Sembah Raja yang datang dengan awan.", "Ya Tuhan, berikan saya kuasa dengan kesucian untuk memuliakan-Mu. Amin.");

	addDay(98, "Hakim-hakim 17:1-18:31", "Mikha dan berhala, suku Dan berpindah, orang Lewi di Dan", "Yohanes 6:1-71", "Lima roti dua ikan, berjalan di atas air, roti hidup, murid-murid meninggalkan Yesus", "Mazmur 98:1-9", "Nyanyikanlah nyanyian baru bagi TUHAN", "Berhala dan Roti Hidup", "Mikha membuat berhala sendiri dan orang Lewi melayaninya. Suku Dan menjadikan berhala sebagai penyembahan resmi. Yesus adalah roti hidup yang turun dari sorga. Mazmur 98 adalah nyanyian baru atas keselamatan.", "פסל", "Pesel", "Patung/berhala - buatan tangan manusia yang menjadi pengganti Tuhan", "Jadikan berhala apa pun dalam hidupmu. Yesus adalah roti hidup yang memuaskan. Nyanyikanlah nyanyian baru atas keselamatan-Nya.", "Ya Tuhan, Engkaulah roti hidupku, jangan biarkan saya menyembah berhala. Amin.");

	addDay(99, "Hakim-hakim 19:1-21:25", "Kejahatan di Gibea, perang dengan Benyamin, perempuan-perempuan untuk Benyamin", "Yohanes 7:1-53", "Yesus ke pesta Pondok Daun, ajaran di bait suci, air hidup, perpecahan tentang Dia", "Mazmur 99:1-9", "TUHAN adalah Raja, gentarlah hai bangsa-bangsa", "Keadilan dan Air Hidup", "Kejahatan mengerikan di Gibea mengakibatkan perang saudara. Yesus menawarkan air hidup yang mengalir. Mazmur 99 memuji Tuhan sebagai Raja yang mengasihi keadilan.", "משׁפט", "Mishpat", "Keadilan - tuntutan Tuhan atas keadilan meski mengakibatkan konflik", "Kejarlah keadilan meski mahal harganya. Terimalah air hidup yang Yesus tawarkan. Sembah Raja yang mengasihi keadilan.", "Ya Tuhan, bantu saya mengejar keadilan dan minum air hidup dari-Mu. Amin.");

	addDay(100, "Rut 1:1-4:22", "Rut dan Naomi, Boas, pewarisan, silsilah Daud", "Yohanes 8:1-59", "Perempuan yang berzinah, terang dunia, Anak Abraham, sebelum Abraham ada Aku", "Mazmur 100:1-5", "Bersorak-soraklah bagi TUHAN, hai seluruh bumi", "Kasih Setia dan Pemulihan", "Rut menunjukkan kasih setia pada Naomi dan menemukan pemulihan melalui Boas. Yesus adalah terang dunia yang ada sebelum Abraham. Mazmur 100 adalah seruan untuk bersorak dan masuk dengan syukur.", "חסד", "Chesed", "Kasih setia - kesetiaan yang melampaui kewajiban, seperti Rut kepada Naomi", "Praktikkan kasih setia yang melampaui kewajiban. Yesus adalah terang yang ada sejak kekal. Masuklah dengan syukur dan pujian.", "Ya Tuhan, ajar saya kasih setia seperti Rut dan terimalah syukur saya. Amin.");

	addDay(101, "1 Samuel 1:1-2:36", "Hana berdoa, kelahiran Samuel, nyanyian Hana, dosa anak-anak Eli", "Yohanes 9:1-41", "Orang buta yang disembuhkan, pengakuan iman, orang Farisi buta", "Mazmur 101:1-8", "Aku akan menyanyikan kasih dan keadilan", "Doa dan Penglihatan", "Hana berdoa dengan penuh perasaan dan Samuel lahir. Yesus menyembuhkan orang buta secara fisik dan rohani. Mazmur 101 adalah komitmen untuk hidup dalam kekudusan.", "תפלה", "Tefillah", "Doa - doa yang didengar karena kerendahan hati dan ketulusan", "Berdoalah dengan hati yang tulus seperti Hana. Terimalah penglihatan rohani dari Yesus. Komitmen untuk hidup dalam kekudusan.", "Ya Tuhan, dengarkanlah doa saya seperti doa Hana dan bukalah mata saya. Amin.");

	addDay(102, "1 Samuel 3:1-4:22", "Panggilan Samuel, kekalahan di Eben-Ezer, tabut ditangkap", "Yohanes 10:1-42", "Gembala yang baik, domba-domba-Ku mendengar suara-Ku, Aku dan Bapa adalah satu", "Mazmur 102:1-28", "Ya TUHAN, dengarkanlah doaku", "Panggilan dan Gembala", "Samuel dipanggil dalam malam. Tabut ditangkap karena dosa umat. Yesus adalah Gembala yang Baik yang mengenal domba-domba-Nya. Mazmur 102 adalah doa orang yang sengsara dalam kesesakan.", "קרא", "Qara", "Memanggil - panggilan yang datang dalam keheningan malam", "Dengarlah panggilan Tuhan dalam keheningan. Yesus adalah Gembala yang menjaga domba-domba-Nya. Bawalah kesesakanmu kepada Tuhan.", "Ya Tuhan, bantu saya mendengar panggilan-Mu dan mengikuti Gembala yang Baik. Amin.");

	addDay(103, "1 Samuel 5:1-7:17", "Dagon jatuh, kematian orang Filistin, tabut dikembalikan, Samuel menjadi hakim", "Yohanes 11:1-57", "Lazarus mati, Yesus adalah kebangkitan dan hidup, Lazarus dibangkitkan", "Mazmur 103:1-22", "Pujilah TUHAN hai jiwaku", "Kuasa dan Kebangkitan", "Tuhan mempermalukan Dagon dan mengembalikan tabut. Yesus adalah kebangkitan dan hidup yang membangkitkan Lazarus. Mazmur 103 adalah pujian atas pengampunan dan kasih karunia Tuhan.", "קומה", "Qumah", "Bangkit - kebangkitan yang menunjukkan kuasa Tuhan atas kematian", "Percayalah kuasa Tuhan atas berhala apa pun. Yesus adalah kebangkitan dan hidup. Pujilah atas pengampunan dan kasih karunia.", "Ya Tuhan, Engkau adalah kebangkitan dan hidupku. Amin.");

	addDay(104, "1 Samuel 8:1-10:27", "Israel minta raja, Saul diurapi, tanda-tanda, Saul menjadi raja", "Yohanes 12:1-50", "Maria meminyaki Yesus, masuk Yerusalem, gandum mati, yang percaya dan tidak percaya", "Mazmur 104:1-35", "Pujilah TUHAN hai jiwaku, TUHAN Allahku, Engkau sangat besar", "Raja dan Pengorbanan", "Israel menolak Tuhan sebagai Raja dan meminta raja manusia. Saul diurapi sebagai raja pertama. Yesus dinyatakan sebagai Raja yang akan mati seperti gandum. Mazmur 104 memuji kebesaran Tuhan sebagai Pencipta.", "מלך", "Melek", "Raja - pilihan untuk memiliki raja manusia menolak Raja surgawi", "Jangan tolak Tuhan sebagai Raja. Yesus adalah Raja yang mati untuk menyelamatkan. Pujilah Pencipta yang besar dan mulia.", "Ya Tuhan, Engkaulah Rajaku, jangan biarkan saya mencari pengganti. Amin.");

	addDay(105, "1 Samuel 11:1-13:23", "Saul menyelamatkan Yabes, Saul ditolak, Yonatan menang di Mikmas", "Yohanes 13:1-38", "Yesus membasuh kaki, pengkhianatan yang diramalkan, perintah baru kasih", "Mazmur 105:1-45", "Bersyukurlah kepada TUHAN, serukanlah nama-Nya", "Kemenangan dan Kasih", "Saul memenangkan kemenangan awal tetapi kemudian ditolak karena ketidaktaatan. Yesus menunjukkan kasih melalui pelayanan membasuh kaki. Mazmur 105 mengingat perjanjian dan perbuatan-perbuatan Tuhan.", "אהבה", "Ahavah", "Kasih - kasih yang ditunjukkan melalui pelayanan dan pengorbanan", "Taatlah sepenuhnya, jangan setengah-setengah seperti Saul. Praktikkan kasih melalui pelayanan. Ingatlah perbuatan-perbuatan Tuhan.", "Ya Tuhan, ajar saya kasih melalui pelayanan seperti yang Yesus contohkan. Amin.");

	addDay(106, "1 Samuel 14:1-52", "Yonatan menyerang, Saul mengutuk, makan dengan darah, kemenangan", "Yohanes 14:1-31", "Rumah Bapa banyak tempat, Aku adalah jalan, Roh Kudus, kasih dan ketaatan", "Mazmur 106:1-48", "Bersyukurlah kepada TUHAN, sebab Ia baik", "Iman dan Jalan", "Yonatan menang karena iman, Saul kalah karena ketidaktaatan. Yesus adalah jalan, kebenaran, dan hidup. Mazmur 106 mengingat kegagalan Israel di padang gurun meski kebaikan Tuhan.", "אמונה", "Emunah", "Iman - iman yang berani melawan keadaan seperti Yonatan", "Miliki iman yang berani meski keadaan bertentangan. Yesus adalah satu-satunya jalan ke Bapa. Bersyukurlah meski sering gagal.", "Ya Tuhan, berikan saya iman seperti Yonatan dan tunjukkan jalan kepada-Mu. Amin.");

	addDay(107, "1 Samuel 15:1-17:37", "Saul ditolak, Samuel memilih Daud, Daud memainkan kecapi, Daud dan Goliat", "Yohanes 15:1-27", "Pokok anggur yang benar, kasih lebih besar dari pada ini, dunia membenci murid-murid", "Mazmur 107:1-43", "Bersyukurlah kepada TUHAN, sebab Ia baik", "Hati dan Buah", "Tuhan melihat hati, bukan penampilan luar. Daud mengalahkan Goliat dengan iman. Yesus adalah pokok anggur, kita adalah ranting-rantingnya. Mazmur 107 adalah syukur atas pembebasan dari berbagai bahaya.", "לב", "Lev", "Hati - yang dilihat Tuhan, bukan penampilan luar", "Perhatikanlah hati, bukan penampilan. Miliki iman seperti Daud melawan Goliat. Tinggallah dalam Yesus untuk berbuah.", "Ya Tuhan, perhatikanlah hati saya dan bantu saya tinggal dalam Yesus. Amin.");

	addDay(108, "1 Samuel 17:38-19:24", "Daud membunuh Goliat, persahabatan dengan Yonatan, Saul cemburu, Daud melarikan diri", "Yohanes 16:1-33", "Roh akan datang, kesedihan akan berubah menjadi sukacita, kemenangan atas dunia", "Mazmur 108:1-13", "Bersiaplah hai jiwaku, aku mau bangun pagi", "Persahabatan dan Roh Kudus", "Persahabatan Daud dan Yonatan melampaui kematian. Saul cemburu dan mengejar Daud. Yesus menjanjikan Roh Kudus yang akan datang. Mazmur 108 adalah keyakinan kemenangan meski dalam kesesakan.", "רוח", "Ruach", "Roh - Roh Kudus yang dijanjikan untuk menuntun dan memberi kekuatan", "Hargailah persahabatan rohani yang tulus. Yakinlah Roh Kudus akan datang dan menuntun. Percayalah kemenangan dalam kesesakan.", "Ya Tuhan, kirimkanlah Roh Kudus-Mu dan bantu saya menghargai persahabatan rohani. Amin.");

	addDay(109, "1 Samuel 20:1-21:15", "Perjanjian Daud dan Yonatan, Daud melarikan diri, Daud di Nob", "Yohanes 17:1-26", "Doa Imam Besar, kesatuan, dikirim ke dunia", "Mazmur 109:1-31", "Ya Allah, kepujian yang kunyanyikan, janganlah berdiam diri", "Kesatuan dan Doa", "Yonatan dan Daud membuat perjanjian kesetiaan. Daud melarikan diri dengan bantuan Yonatan. Yesus berdoa untuk kesatuan murid-murid. Mazmur 109 adalah doa orang yang difitnah dan dianiaya.", "אחד", "Echad", "Satu - kesatuan yang dikejar dalam perjanjian dan doa", "Kejarlah kesatuan dalam hubungan rohani. Yesus berdoa untuk kesatuan umat-Nya. Bawalah doa dalam penderitaan kepada Tuhan.", "Ya Tuhan, jadikanlah kami satu seperti Engkau dan Bapa adalah satu. Amin.");

	addDay(110, "1 Samuel 22:1-24:22", "Daud di Adulam, dibunuhnya imam-imam, Daud di Horesh, Daud mengampuni Saul", "Yohanes 18:1-40", "Penangkapan di taman Getsemani, dihadapkan Hanas, dihadapkan Pilatus", "Mazmur 110:1-7", "Kata TUHAN kepada tuanku, duduklah di sebelah kanan-Ku", "Pengampunan dan Kerajaan", "Daud mengampuni Saul yang berusaha membunuhnya. Yesus ditangkap dan dihadapkan kepada para pemimpin. Mazmur 110 adalah nubuat tentang Mesias sebagai Raja dan Imam untuk selama-lamanya.", "מלכי צדק", "Malki-Tzedek", "Raja Salem - imam dan raja, bayangan Yesus sebagai Imam dan Raja", "Ampunilah musuhmu seperti Daud. Yesus adalah Imam dan Raja untuk selama-lamanya. Sembah Dia yang duduk di sebelah kanan Bapa.", "Ya Tuhan, ajar saya mengampuni seperti Daud dan sembah Yesus Raja dan Imamku. Amin.");

	addDay(111, "1 Samuel 25:1-28:2", "Kematian Samuel, Daud dan Abigail, Daud mengampuni Saul lagi", "Yohanes 19:1-42", "Yesus disiksa, disalibkan, mati, dimakamkan", "Mazmur 111:1-10", "Bersyukurlah kepada TUHAN dengan segenap hati", "Hikmat dan Salib", "Abigail menunjukkan hikmat dalam mencegah pembunuhan. Daud mengampuni Saul lagi. Yesus mati di kayu salib. Mazmur 111 memuji perbuatan-perbuatan besar Tuhan dan permulaan hikmat adalah takut akan Tuhan.", "חכמה", "Chokmah", "Hikmat - hikmat yang mencegah konflik dan membangun perdamaian", "Gunakan hikmat untuk mencegah konflik. Lihatlah salib sebagai bukti kasih Allah. Takutlah akan Tuhan sebagai permulaan hikmat.", "Ya Tuhan, berikan saya hikmat seperti Abigail dan takut akan-Mu. Amin.");

	addDay(112, "1 Samuel 28:3-31:13", "Saul dan perempuan tukang sihir di En-Dor, kekalahan di Gilboa, kematian Saul", "Yohanes 20:1-31", "Kebangkitan Yesus, penampakan kepada Maria, murid-murid, Thomas", "Mazmur 112:1-10", "Berbahagialah orang yang takut akan TUHAN", "Akhir dan Kebangkitan", "Saul berakhir tragis karena ketidaktaatan dan mencari bantuan tukang sihir. Yesus bangkit dan menampakkan diri. Mazmur 112 menggambarkan berkat bagi yang takut akan Tuhan.", "תחיה", "Techiyah", "Kebangkitan - kemenangan atas kematian yang membuka jalan baru", "Jangan berakhir seperti Saul yang mencari bantuan salah. Rayakan kebangkitan Yesus. Takutlah akan Tuhan untuk menerima berkat.", "Ya Tuhan, terima kasih untuk kebangkitan-Mu yang memberi pengharapan. Amin.");

	addDay(113, "2 Samuel 1:1-2:32", "Daud meratapi Saul dan Yonatan, Daud menjadi raja, perang antara Daud dan Isyboset", "Yohanes 21:1-25", "Penampakan di pantai Tiberias, gembalakan domba-domba-Ku, Petrus yang dikasihi", "Mazmur 113:1-9", "Pujilah hai hamba-hamba TUHAN", "Kesetiaan dan Penggembalaan", "Daud meratapi musuhnya Saul dengan kesetiaan. Daud menjadi raja atas Yehuda. Yesus memanggil Petrus untuk menggembalakan domba-domba-Nya. Mazmur 113 memuji Tuhan yang meninggikan yang rendah.", "אמת", "Emet", "Kesetiaan/kebenaran - kesetiaan Daud meski Saul berusaha membunuhnya", "Miliki kesetiaan meski kepada musuh. Jadilah penggembala seperti yang dipanggil Yesus. Pujilah Tuhan yang meninggikan yang rendah.", "Ya Tuhan, ajar saya kesetiaan seperti Daud dan gembalakan domba-domba-Mu. Amin.");

	addDay(114, "2 Samuel 3:1-5:25", "Perang saudara, Daud menjadi raja atas seluruh Israel, Daud merebut Yerusalem", "Kisah Para Rasul 1:1-26", "Kenaikan Yesus, menunggu di Yerusalem, pemilihan Matias", "Mazmur 114:1-8", "Ketika Israel keluar dari Mesir", "Persatuan dan Kenaikan", "Daud menyatukan Israel dan Yehuda. Yerusalem menjadi kota Daud. Yesus naik ke sorga dan murid-murid menunggu di Yerusalem. Mazmur 114 menggambarkan alam bereaksi ketika Israel keluar dari Mesir.", "אחדות", "Achdut", "Persatuan - kesatuan yang dicapai melalui kepemimpinan yang adil", "Kejarlah persatuan dalam tubuh Kristus. Tunggulah di 'Yerusalem' rohani untuk pencurahan Roh. Lihatlah alam bereaksi terhadap kuasa Tuhan.", "Ya Tuhan, satukanlah umat-Mu dan bantu saya menunggu pencurahan Roh. Amin.");

	addDay(115, "2 Samuel 6:1-7:29", "Tabut dibawa ke Yerusalem, Daud menari, perjanjian dengan Daud", "Kisah Para Rasul 2:1-47", "Pentakosta, pencurahan Roh Kudus, pengajaran para rasul, gereja mula-mula", "Mazmur 115:1-18", "Bukan kepada kami ya TUHAN, bukan kepada kami", "Kehadiran dan Roh Kudus", "Daud membawa tabut dengan sukacita dan menari. Tuhan menolak Daud membangun bait suci tetapi memberikan perjanjian keturunan. Roh Kudus dicurahkan di Pentakosta. Mazmur 115 menolak kemuliaan diri dan mengarahkan kepada Tuhan.", "שׁכינה", "Shekinah", "Kehadiran - kehadiran Tuhan yang turun dan memenuhi umat-Nya", "Sambutlah kehadiran Tuhan dengan sukacita seperti Daud. Terimalah pencurahan Roh Kudus. Arahkanlah kemuliaan hanya kepada Tuhan.", "Ya Tuhan, penuhilah saya dengan Roh Kudus seperti Pentakosta. Amin.");

	addDay(116, "2 Samuel 8:1-10:19", "Kemenangan-kemenangan Daud, Daud dan Mefiboset, Daud mengalahkan bangsa-bangsa", "Kisah Para Rasul 3:1-26", "Penyembuhan orang lumpuh, pengajaran di Bait Suci, nubuat tentang Mesias", "Mazmur 116:1-19", "Aku cinta kepada TUHAN, sebab Ia mendengar suaraku", "Kasih dan Kesaksian", "Daud menunjukkan kasih pada Mefiboset karena Yonatan. Kemenangan-kemenangan militer. Petrus menyembuhkan orang lumpuh atas nama Yesus. Mazmur 116 adalah syukur atas penyelamatan dari maut.", "חסד", "Chesed", "Kasih setia - kasih yang melampaui kewajiban karena perjanjian", "Praktikkan kasih setia yang melampaui kewajiban. Saksikan kuasa nama Yesus. Syukurlah atas penyelamatan dari maut.", "Ya Tuhan, aku cinta kepada-MU karena Engkau mendengar suaraku. Amin.");

	addDay(117, "2 Samuel 11:1-12:31", "Daud dan Batsyeba, nubuat Natan, Daud bertobat, Salomo lahir", "Kisah Para Rasul 4:1-37", "Petrus dan Yohanes dihadapkan majelis, doa untuk keberanian, kehidupan bersama", "Mazmur 117:1-2", "Pujilah TUHAN hai segala bangsa", "Tobat dan Pengampunan", "Daud berbuat dosa besar tetapi bertobat ketika dihadapkan. Yesaya adalah hasil tobat. Gereja mula-mula berdoa untuk keberanian. Mazmur 117 adalah mazmur terpendek yang memanggil semua bangsa untuk memuji.", "תשׁובה", "Teshuvah", "Tobat - kembali kepada Tuhan dengan pengakuan dan perubahan hati", "Jangan takut bertobat meski dosa besar. Tuhan menerima tobat yang tulus. Pujilah Tuhan bersama segala bangsa.", "Ya Tuhan, terima tobat saya seperti Engkau menerima tobat Daud. Amin.");

	addDay(118, "2 Samuel 13:1-14:33", "Amnon dan Tamar, Absalom membunuh Amnon, Absalom kembali dari pembuangan", "Kisah Para Rasul 5:1-42", "Ananias dan Safira, tanda-tanda dan mujizat, para rasul di penjara, Gamaliel", "Mazmur 118:1-29", "Bersyukurlah kepada TUHAN, sebab Ia baik", "Konsekuensi dan Kebenaran", "Dosa Amnon membawa pembalasan Absalom dan perpecahan keluarga. Dosa tidak pernah hanya mempengaruhi satu orang, tetapi merembet ke seluruh keluarga dan bangsa. Yoakim mencoba memperbaiki dengan cara manusiawi, tetapi hati Absalom tetap pahit. Di PB, kita melihat kejujuran yang diperlukan dalam komunitas percaya - Ananias dan Safira menipu Roh Kudus dan mati. Tetapi para rasul lainnya menghadapi penganiayaan dengan sukacita karena dianggap layak menderita untuk Nama Yesus. Gamaliel memberikan nasihat bijak untuk tidak melawan rencana Tuhan. Mazmur 118 adalah mazmur kemenangan yang sering dipakai pada perayaan Paskah - batu yang dibuang para tukang bangunan telah menjadi batu penjuru.", "אמת", "Emet", "Kebenaran/kejujuran - kejujuran dalam komunitas dan kebenaran yang membebaskan", "Hindari dosa yang merembet seperti Amnon. Praktikkan kejujuran penuh dalam komunitas percaya. Rayakan bahwa 'batu yang dibuang' Yesus telah menjadi batu penjuru keselamatan.", "Ya Tuhan, ajar saya kejujuran dan bantu saya melihat konsekuensi dosa. Terima kasih Yesus adalah batu penjuru saya. Amin.");

	addDay(119, "2 Samuel 15:1-16:23", "Absalom memberontak, Daud melarikan diri, Simei mengutuk Daud, Husai menipu Absalom", "Kisah Para Rasul 6:1-15", "Pemilihan tujuh pelayan, Stefanus penuh dengan iman dan kuasa, tuduhan palsu", "Mazmur 119:1-176", "Berbahagialah orang yang hidupnya tidak bercela", "Pemberontakan dan Kesaksian", "Absalom menggunakan pesona dan janji-janji palsu untuk merebut tahta. Daud melarikan diri dengan penuh penghinaan - Simei mengutuk dan melemparinya dengan batu, tetapi Daud menerima ini sebagai hukuman dari Tuhan. Husai setia pada Daud dan menipu Absalom dengan nasihat yang tampak bijak tetapi sebenarnya merusak. Di PB, gereja menghadapi masalah administrasi tetapi menyelesaikannya dengan bijaksana. Stefanus dipilih karena penuh dengan Roh Kudus dan hikmat, tetapi kemudian menjadi martir pertama. Mazmur 119 adalah mazmur terpanjang yang memuji Firman Tuhan dalam setiap bagian kehidupan - dari aleph sampai taw, dari awal sampai akhir.", "נוע", "Noa", "Bergerak/melarikan diri - Daud yang melarikan diri tetapi tetap percaya perlindungan Tuhan", "Ketika 'Absalom' dalam hidupmu memberontak, percayalah rencana Tuhan meski harus 'melarikan diri' sementara. Terimalah penghinaan sebagai pemurnian. Peganglah Firman Tuhan dari A sampai Z sebagai penuntun hidup.", "Ya Tuhan, bantu saya percaya rencana-Mu meski dalam pemberontakan dan pengucilan. Amin.");

	addDay(120, "2 Samuel 17:1-18:33", "Nasihat Ahitophel dan Husai, Daud diselamatkan, Absalom terbunuh, ratapan Daud", "Kisah Para Rasul 6:15-7:60", "Pertama martir Stefanus, penglihatan kemuliaan Yesus, batu sampai mati", "Mazmur 120:1-7", "Aku berseru kepada TUHAN dalam kesesakanku", "Pengkhianatan dan Pengampunan", "Ahitophel memberikan nasihat yang sangat baik - jika diikuti pasti Daud akan mati - tetapi Tuhan membuat Husai mengalahkan nasihat Ahitophel dengan cara yang tidak masuk akal. Absalom terbunuh dengan tragis - rambutnya yang congkak tersangkut pada pohon. Daud meratapi anaknya meski Absalom ingin membunuhnya - 'Hai anakku Absalom, anakku, anakku Absalom! Andai saja aku mati menggantikan engkau!' Di PB, Stefanus menjadi martir pertama dengan penuh kemuliaan - melihat Yesus berdiri di sebelah kanan Allah, dan mengampuni mereka yang melemparinya. Mazmur 120 adalah doa orang yang tinggal di antara orang-orang yang membenci damai.", "אב", "Av", "Bapa - ratapan bapa yang tetap mengasihi meski anak berontak", "Percayalah bahwa nasihat Tuhan akan mengalahkan nasihat 'Ahitophel' apapun. Miliki hati bapa yang mengasihi meski dikhianati. Mengampunilah seperti Stefanus yang melihat kemuliaan Yesus meski sedang disiksa.", "Ya Tuhan, berikan saya hati yang mengasihi seperti Daud dan mengampuni seperti Stefanus. Amin.");

        function getBibleLink(ref) {
    // Gunakan Alkitab Sabda yang lebih reliable untuk bahasa Indonesia
    // Format: https://alkitabsabda.com/web/index.php?b=1&c=1&v=1 (perlu konversi)
    
    // Mapping ke nomor kitab Alkitab Sabda
    const kitabNum = {
        'Kejadian': 1, 'Keluaran': 2, 'Imamat': 3, 'Bilangan': 4,
        'Ulangan': 5, 'Yosua': 6, 'Hakim-hakim': 7, 'Rut': 8,
        '1 Samuel': 9, '2 Samuel': 10, '1 Raja-raja': 11, '2 Raja-raja': 12,
        '1 Tawarikh': 13, '2 Tawarikh': 14, 'Ezra': 15, 'Nehemia': 16,
        'Ester': 17, 'Ayub': 18, 'Mazmur': 19, 'Amsal': 20,
        'Pengkhotbah': 21, 'Kidung Agung': 22, 'Yesaya': 23, 'Yeremia': 24,
        'Ratapan': 25, 'Yehezkiel': 26, 'Daniel': 27, 'Hosea': 28,
        'Yoel': 29, 'Amos': 30, 'Obaja': 31, 'Yunus': 32,
        'Mikha': 33, 'Nahum': 34, 'Habakuk': 35, 'Zefanya': 36,
        'Hagai': 37, 'Zakharia': 38, 'Maleakhi': 39, 'Matius': 40,
        'Markus': 41, 'Lukas': 42, 'Yohanes': 43, 'Kisah Para Rasul': 44,
        'Roma': 45, '1 Korintus': 46, '2 Korintus': 47, 'Galatia': 48,
        'Efesus': 49, 'Filipi': 50, 'Kolose': 51, '1 Tesalonika': 52,
        '2 Tesalonika': 53, '1 Timotius': 54, '2 Timotius': 55,
        'Titus': 56, 'Filemon': 57, 'Ibrani': 58, 'Yakobus': 59,
        '1 Petrus': 60, '2 Petrus': 61, '1 Yohanes': 62, '2 Yohanes': 63,
        '3 Yohanes': 64, 'Yudas': 65, 'Wahyu': 66
    };
    
    let cleanRef = ref.trim();
    let kitabIndo = '';
    let ayat = '';
    
    for (let [indo, num] of Object.entries(kitabNum)) {
        if (cleanRef.startsWith(indo)) {
            kitabIndo = indo;
            ayat = cleanRef.substring(indo.length).trim();
            break;
        }
    }
    
    if (!kitabIndo) return 'https://alkitabsabda.com/';
    
    const b = kitabNum[kitabIndo];
    
    // Parse ayat: "1:1-2:25" atau "23:1-6"
    const match = ayat.match(/(\d+):(\d+)(?:-(\d+):(\d+)|-(\d+))?/);
    if (!match) return `https://alkitabsabda.com/web/index.php?b=${b}&c=1&v=1`;
    
    const pasal = match[1];
    const v1 = match[2];
    
    return `https://alkitabsabda.com/web/index.php?b=${b}&c=${pasal}&v=${v1}`;
}

let currentDay = 1;
let completedDays = JSON.parse(localStorage.getItem('completedDays') || '[]');

    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
}

function loadDay(day) {
    day = parseInt(day);
    if (day < 1) day = 1;
    if (day > 365) day = 365;
    currentDay = day;
    document.getElementById('dayInput').value = day;
    
    const data = readingPlan[day];
    if (!data) return;
    
    const content = document.getElementById('readingContent');
    const isCompleted = completedDays.includes(day);
    
    const plLink = getBibleLink(data.pl.ref);
    const pbLink = getBibleLink(data.pb.ref);
    const wLink = getBibleLink(data.wisdom.ref);
    
    content.innerHTML = `
        <div class="reading-card">
            <div class="day-header">
                <div>
                    <div class="day-number">Hari ${day}</div>
                    <div class="day-date">${new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                </div>
                <div class="check-complete ${isCompleted ? 'checked' : ''}" onclick="toggleComplete(${day})" title="Tandai selesai"></div>
            </div>
            <h2 style="margin-bottom: 20px; color: var(--secondary);">${data.title}</h2>
            <div class="reading-section">
                <div class="section-title pl-title">📜 Perjanjian Lama</div>
                <div class="passage-box pl-box">
                    <div class="passage-ref">${data.pl.ref}</div>
                    <div class="passage-desc">${data.pl.desc}</div>
                    <a href="${plLink}" target="_blank" class="btn-read">📖 Baca Ayat</a>
                </div>
            </div>
            <div class="reading-section">
                <div class="section-title pb-title">📖 Perjanjian Baru</div>
                <div class="passage-box pb-box">
                    <div class="passage-ref">${data.pb.ref}</div>
                    <div class="passage-desc">${data.pb.desc}</div>
                    <a href="${pbLink}" target="_blank" class="btn-read">📖 Baca Ayat</a>
                </div>
            </div>
            <div class="reading-section">
                <div class="section-title wisdom-title">🕊️ Mazmur / Amsal</div>
                <div class="passage-box wisdom-box">
                    <div class="passage-ref">${data.wisdom.ref}</div>
                    <div class="passage-desc">${data.wisdom.desc}</div>
                    <a href="${wLink}" target="_blank" class="btn-read">📖 Baca Ayat</a>
                </div>
            </div>
            <div class="reflection-box">
                <div class="reflection-title">💡 Renungan</div>
                <div class="reflection-content">${data.reflection}</div>
                <div class="original-word">
                    <div class="hebrew-text">${data.original.word}</div>
                    <div class="transliteration">${data.original.transliteration}</div>
                    <div class="word-meaning">(${data.original.lang}) ${data.original.meaning}</div>
                </div>
                <div class="application-box">
                    <div class="application-title">🎯 Aplikasi</div>
                    <div>${data.application}</div>
                </div>
                <div class="prayer-box">
                    <div style="font-weight: bold; margin-bottom: 8px;">🙏 Doa</div>
                    <div>${data.prayer}</div>
                </div>
            </div>
            <div class="nav-buttons">
                <button onclick="previousDay()">← Hari Sebelumnya</button>
                <button onclick="nextDay()">Hari Berikutnya →</button>
            </div>
        </div>
    `;
    updateProgress();
}

function toggleComplete(day) {
    const index = completedDays.indexOf(day);
    if (index > -1) completedDays.splice(index, 1);
    else completedDays.push(day);
    localStorage.setItem('completedDays', JSON.stringify(completedDays));
    loadDay(day);
}

function previousDay() { if (currentDay > 1) loadDay(currentDay - 1); }
function nextDay() { if (currentDay < 365) loadDay(currentDay + 1); }

function goToToday() {
    const startDate = new Date('2025-01-01');
    const today = new Date();
    const diffDays = Math.ceil(Math.abs(today - startDate) / (1000 * 60 * 60 * 24));
    loadDay(Math.min(diffDays, 365));
}

function resetProgress() {
    if (confirm('Apakah Anda yakin ingin mereset semua progress?')) {
        completedDays = [];
        localStorage.removeItem('completedDays');
        updateProgress();
        loadDay(currentDay);
    }
}

function updateProgress() {
    const percentage = Math.round((completedDays.length / 365) * 100);
    document.getElementById('progressBar').style.width = percentage + '%';
    document.getElementById('progressText').textContent = percentage + '%';
    document.getElementById('completedCount').textContent = completedDays.length;
    document.getElementById('remainingCount').textContent = 365 - completedDays.length;
}

if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

const savedDay = localStorage.getItem('currentDay');
if (savedDay) loadDay(parseInt(savedDay));
else goToToday();

window.addEventListener('beforeunload', () => localStorage.setItem('currentDay', currentDay));
    </script>
</body>
</html>
